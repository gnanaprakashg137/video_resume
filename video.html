<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Video</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        background: #0b1730;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .video-container {
        position: relative;
        width: 90%;
        max-width: 900px;
        height: 90vh; /* full height use pannum */
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: contain; /* IMPORTANT 🔥 */
        background: black;
        border-radius: 12px;
    }

    .play-icon {
        position: absolute;
        font-size: 50px;
        color: white;
        display: none;
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="video-container" onclick="toggleVideo()">
    <video id="myVideo" autoplay muted playsinline>
        <source src="Video_Resume_1.mp4" type="video/mp4">
    </video>

    <div class="play-icon" id="icon">▶</div>
</div>

<script>
    const video = document.getElementById("myVideo");
    const icon = document.getElementById("icon");

    window.addEventListener("load", () => {
        video.play().catch(() => {
            icon.style.display = "block";
        });
    });

    function toggleVideo() {
        if (video.paused) {
            video.play();
            icon.style.display = "none";
        } else {
            video.pause();
            icon.style.display = "block";
        }
    }

    video.addEventListener("ended", () => {
        icon.style.display = "block";
    });
</script>

</body>
</html>
